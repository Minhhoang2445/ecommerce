worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    upstream product-cluster {
        server product-service:8080 max_fails=3 fail_timeout=15s;
    }
    
    upstream order-cluster {
        server order-service:8081 max_fails=3 fail_timeout=15s;
    }
    
    upstream inventory-cluster {
        server inventory-service:8082 max_fails=3 fail_timeout=15s;
    }

    server {
        listen       80;
        server_name  localhost;

        location /api/product {
            proxy_pass http://product-cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Handled-By $upstream_addr always;
        }

        location /api/order {
            proxy_pass http://order-cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Handled-By $upstream_addr always;
        }

        location /api/inventory {
            proxy_pass http://inventory-cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Handled-By $upstream_addr always;
        }
    }
}