spring.application.name=inventory-service

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${DB_NAME:inventory_service}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mysql}
spring.jpa.hibernate.ddl-auto=none
server.port=8082

# Redis configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

# RabbitMQ configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=myuser
spring.rabbitmq.password=123456

rabbitmq.exchange.name=ecommerce.events
rabbitmq.routing.key=stock.deduct
rabbitmq.queue.name=inventory.stock.queue